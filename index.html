<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Snake</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <section class="arena" aria-label="Neon Snake">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <p>NEON</p>
            <h1>SNAKE</h1>
          </div>
        </div>

        <div class="hud" aria-live="polite">
          <div class="hud-item">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="hud-item">
            <span>Best</span>
            <strong id="bestScore">0</strong>
          </div>
          <div class="hud-item">
            <span>Level</span>
            <strong id="level">1</strong>
          </div>
          <div class="hud-item">
            <span>Speed</span>
            <strong id="speed">1.0x</strong>
          </div>
        </div>
      </header>

      <div class="stage" id="stage">
        <canvas id="gameCanvas" width="900" height="900" aria-label="Snake game board"></canvas>
        <div class="screen-flare" id="screenFlare"></div>
        <div class="overlay" id="overlay">
          <div class="overlay-panel">
            <span id="stateLabel">READY</span>
            <strong id="stateTitle">NEON SNAKE</strong>
            <p id="stateText">PRESS START</p>
          </div>
        </div>
      </div>

      <footer class="controls">
        <div class="action-row">
          <button id="startBtn" class="action primary" type="button">Start</button>
          <button id="pauseBtn" class="action" type="button">Pause</button>
          <button id="restartBtn" class="action" type="button">Restart</button>
          <button id="recordsBtn" class="action" type="button">Records</button>
        </div>

        <div class="dpad" aria-label="Direction controls">
          <button data-dir="up" class="dir up" type="button" aria-label="Up">▲</button>
          <button data-dir="left" class="dir left" type="button" aria-label="Left">◀</button>
          <button data-dir="right" class="dir right" type="button" aria-label="Right">▶</button>
          <button data-dir="down" class="dir down" type="button" aria-label="Down">▼</button>
        </div>
      </footer>
    </section>

    <section class="modal visible" id="playerModal" aria-label="Player profile">
      <div class="modal-panel player-panel">
        <span class="modal-kicker">CHALLENGER ID</span>
        <h2>输入你的名字吧，挑战者</h2>
        <div class="field-row">
          <input id="playerNameInput" class="neon-input" maxlength="24" autocomplete="nickname" placeholder="输入或搜索名字">
          <button id="playerStartBtn" class="action primary" type="button">Enter</button>
        </div>
        <div class="suggestions" id="playerSuggestions"></div>
        <p class="modal-note" id="playerHint">已有记录会自动出现在搜索结果里。</p>
      </div>
    </section>

    <section class="modal" id="confirmPlayerModal" aria-label="Confirm player">
      <div class="modal-panel compact-panel">
        <span class="modal-kicker">RETURNING PLAYER</span>
        <h2>确认这个是你？</h2>
        <p id="confirmPlayerText"></p>
        <div class="modal-actions">
          <button id="confirmPlayerBtn" class="action primary" type="button">Confirm</button>
          <button id="cancelConfirmPlayerBtn" class="action" type="button">Change</button>
        </div>
      </div>
    </section>

    <section class="modal" id="recordsModal" aria-label="Records table">
      <div class="modal-panel records-panel">
        <div class="records-head">
          <div>
            <span class="modal-kicker">LEADERBOARD</span>
            <h2>Records</h2>
          </div>
          <button id="closeRecordsBtn" class="action" type="button">Close</button>
        </div>
        <input id="recordsSearchInput" class="neon-input" maxlength="24" placeholder="搜索玩家">
        <div class="records-table" id="recordsTable"></div>
      </div>
    </section>

    <div class="toast-lane" id="toastLane" aria-live="polite"></div>
  </main>

  <script src="./script.js"></script>
</body>
</html>
